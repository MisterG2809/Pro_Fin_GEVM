# Configuracion SMTP para envio de correos OBLIVION
# Descomenta y configura para habilitar el envio real de correos
#
# Ejemplo con Gmail:
# mail.smtp.host=smtp.gmail.com
# mail.smtp.port=587
# mail.smtp.auth=true
# mail.smtp.starttls.enable=true
# mail.smtp.user=tu-correo@gmail.com
# mail.smtp.password=tu-contrasena-de-aplicacion
# mail.from=tu-correo@gmail.com
#
# Sin configuracion, los correos solo se registran en el log del servidor
